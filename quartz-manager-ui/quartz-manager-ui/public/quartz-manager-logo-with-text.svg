      font-size="82"
      font-weight="800"
      letter-spacing="1">
      <tspan fill="#FFFFFF">QUARTZ </tspan><tspan fill="#10b981">MANAGER</tspan>
    </text>

    <text
      x="4" y="54"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
