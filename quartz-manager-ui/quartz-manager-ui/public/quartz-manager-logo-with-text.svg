    <line x1="256" y1="256" x2="343" y2="206"
          stroke="#3A9C40" stroke-width="9" stroke-linecap="round"/>

    <!-- Center dot -->
    <circle cx="256" cy="256" r="11" fill="#3A9C40"/>
